customCommands:
  - key: "C"
    context: "files"
    description: "Commit with Claude"
    prompts:
      - type: "menu"
        title: "Commit options"
        options:
          - name: "Commit only"
            value: ""
            key: "C"
          - name: "Commit and push"
            value: "--push"
            key: "P"
    # git-ai-commit.sh: one-shot claude -p for the message (~10s) + privacy-safe
    # submodule handling. Commits what you've staged in the UI. The menu value is
    # "" (commit only) or "--push".
    command: '~/.scripts/git-ai-commit.sh {{index .PromptResponses 0}}'
    output: terminal
gui:
  theme:
    activeBorderColor:
      - "#8b7ec8" # purple-400
      - bold
    inactiveBorderColor:
      - "#575653" # ui-3 (base-600)
    optionsTextColor:
      - "#da702c" # orange-400
    selectedLineBgColor:
      - "#403e3c" # ui-2 (base-800)
    cherryPickedCommitBgColor:
      - "#343331" # ui (base-850)
    cherryPickedCommitFgColor:
      - "#3aa99f" # cyan-400
    unstagedChangesColor:
      - "#d14d41" # red-400
    defaultFgColor:
      - "#cecdc3" # tx (base-200)
    searchingActiveBorderColor:
      - "#d0a215" # yellow-400
